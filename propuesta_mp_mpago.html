<title>Propuesta Mercado Pago</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#009EE3;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.box{background:white;border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center}
.logo{width:56px;height:56px;background:#009EE3;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;margin:0 auto 18px}
h2{font-size:22px;font-weight:600;color:#1A1A2E;margin-bottom:6px}
p{font-size:14px;color:#5F6368;margin-bottom:28px;line-height:1.5}
input{width:100%;padding:14px 16px;border:1.5px solid #E8EAED;border-radius:10px;font-size:16px;text-align:center;letter-spacing:0.2em;outline:none;color:#1A1A2E;margin-bottom:12px;font-family:inherit}
input:focus{border-color:#009EE3}
button{width:100%;padding:14px;background:#009EE3;color:white;border:none;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit}
button:active{opacity:0.88}
#err{font-size:13px;color:#e53935;margin-top:10px;min-height:18px}
#loading{display:none;font-size:13px;color:#009EE3;margin-top:10px;font-weight:500}
.footer{font-size:12px;color:rgba(255,255,255,0.7);margin-top:20px;text-align:center}
</style>
</head>
<body>
<div class="box">
  <div class="logo">MP</div>
  <h2>Propuesta exclusiva</h2>
  <p>Este documento fue preparado especialmente para ti.<br>Ingresa la clave que te entregó tu ejecutiva.</p>
  <input type="password" id="pwd" placeholder="••••••••" maxlength="20" onkeydown="if(event.key==='Enter')unlock()">
  <button onclick="unlock()">Ingresar</button>
  <div id="err"></div>
  <div id="loading">Descifrando propuesta...</div>
</div>
<div class="footer">Mercado Pago · Documento confidencial · No compartir</div>

async function unlock() {
  const pwd = document.getElementById('pwd').value.trim();
  if (!pwd) { document.getElementById('err').textContent = 'Ingresa la clave.'; return; }
  document.getElementById('err').textContent = '';
  document.getElementById('loading').style.display = 'block';
  try {
    async function deriveKeyBytes(password, length) {
      const enc2 = new TextEncoder();
      let seed = await crypto.subtle.digest('SHA-256', enc2.encode(password));
      let key = new Uint8Array(0);
      while (key.length < length) {
        seed = await crypto.subtle.digest('SHA-256', seed);
        const chunk = new Uint8Array(seed);
        const merged = new Uint8Array(key.length + chunk.length);
        merged.set(key); merged.set(chunk, key.length);
        key = merged;
      }
      return key.slice(0, length);
    }
    const raw = Uint8Array.from(atob(ENCRYPTED), c => c.charCodeAt(0));
    const keyBytes = await deriveKeyBytes(pwd, raw.length);
    const decrypted = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) decrypted[i] = raw[i] ^ keyBytes[i];
    const html = new TextDecoder().decode(decrypted);
    if (!html.trim().startsWith('<')) throw new Error('Wrong key');
    document.open(); document.write(html); document.close();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err').textContent = 'Clave incorrecta. Solicítala a tu ejecutiva.';
    document.getElementById('pwd').value = '';
    document.getElementById('pwd').focus();
  }
}
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && ['s','u','p'].includes(e.key.toLowerCase())) e.preventDefault();
});
</script>
