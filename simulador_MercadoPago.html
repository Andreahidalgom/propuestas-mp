<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador Mercado Pago</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; padding: 16px; }
  .container { max-width: 520px; margin: 0 auto; }
  .header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-top: 8px; }
  .logo { width: 44px; height: 44px; background: #009EE3; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .header h1 { font-size: 18px; font-weight: 700; color: #111; }
  .header p { font-size: 12px; color: #666; margin-top: 2px; }
  .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
  label { display: block; font-size: 13px; font-weight: 600; color: #444; margin-bottom: 8px; }
  input[type=number] { width: 100%; padding: 13px 14px; border: 1.5px solid #e0e0e0; border-radius: 10px; font-size: 15px; color: #111; outline: none; transition: border .15s; -webkit-appearance: none; }
  input[type=number]:focus { border-color: #009EE3; }
  .toggle { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .toggle button { padding: 12px; font-size: 14px; font-weight: 600; border-radius: 10px; border: 1.5px solid #e0e0e0; background: #fff; color: #666; cursor: pointer; }
  .toggle button.active { background: #009EE3; color: #fff; border-color: #009EE3; }
  .plan-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .plan-card { background: #fff; border: 1.5px solid #e8e8e8; border-radius: 14px; padding: 14px; }
  .plan-card.winner { border: 2.5px solid #009EE3; }
  .plan-badge { display: inline-block; background: #e6f5fd; color: #0077b6; font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 20px; margin-bottom: 8px; }
  .plan-spacer { height: 22px; }
  .plan-name { font-size: 14px; font-weight: 700; color: #111; margin-bottom: 2px; }
  .plan-tasa { font-size: 11px; color: #999; margin-bottom: 10px; }
  .drow { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #f5f5f5; font-size: 12px; }
  .drow:last-of-type { border-bottom: none; }
  .drow .lbl { color: #888; }
  .drow .val { color: #111; font-weight: 500; }
  .recibe { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; padding-top: 8px; border-top: 1.5px solid #f0f0f0; }
  .recibe .lbl { font-size: 12px; color: #666; }
  .recibe .val { font-size: 18px; font-weight: 700; color: #00a650; }
  .sec-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .plan-label { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .plan-label .badge-win { background: #e6f5fd; color: #0077b6; font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
  textarea.redac { width: 100%; padding: 14px 16px; border: 1px solid #e8e8e8; border-radius: 12px; font-size: 13px; line-height: 1.75; color: #222; margin-bottom: 10px; min-height: 80px; background: #f8f9fa; font-family: inherit; resize: none; outline: none; }
  .btn-copy { width: 100%; padding: 13px; font-size: 14px; font-weight: 700; border: none; border-radius: 12px; background: #009EE3; color: #fff; cursor: pointer; -webkit-tap-highlight-color: transparent; margin-bottom: 16px; }
  .btn-copy.ok { background: #00a650; }
  .divider { border: none; border-top: 1.5px solid #f0f0f0; margin: 4px 0 16px; }
  #empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
  #empty svg { display: block; margin: 0 auto 12px; opacity: .4; }
  #results { display: none; }
  @media (max-width: 360px) { .plan-cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">
      <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2.2" viewBox="0 0 24 24">
        <rect x="1" y="4" width="22" height="16" rx="3"/><line x1="1" y1="10" x2="23" y2="10"/>
      </svg>
    </div>
    <div>
      <h1>Simulador Mercado Pago</h1>
      <p>Tasa según volumen mensual · monto por venta</p>
    </div>
  </div>

  <div class="card">
    <label for="ventas">Ventas totales al mes ($)</label>
    <input id="ventas" type="number" inputmode="numeric" placeholder="ej: 5000000" min="0" step="100000" oninput="calc()" />
    <div style="margin-top:16px;">
      <label for="ticket">Monto por venta ($)</label>
      <input id="ticket" type="number" inputmode="numeric" placeholder="ej: 50000" min="0" step="1000" oninput="calc()" />
    </div>
    <div class="toggle">
      <button id="btn-d" class="active" onclick="setT('d')">Débito / Prepago</button>
      <button id="btn-c" onclick="setT('c')">Crédito</button>
    </div>
  </div>

  <div id="empty">
    <svg width="40" height="40" fill="none" stroke="#aaa" stroke-width="1.5" viewBox="0 0 24 24">
      <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    Ingresa el volumen mensual y el monto<br>por venta para ver la simulación
  </div>

  <div id="results">
    <p class="sec-label">Comparación de planes</p>
    <div class="plan-cards" id="cards"></div>

    <div class="card" style="margin-bottom:12px;">
      <p class="sec-label">Redacciones listas para enviar</p>

      <!-- Plan Estándar -->
      <div class="plan-label">
        📋 Plan Estándar <span class="badge-win" id="badge-est" style="display:none">Más conveniente</span>
      </div>
      <textarea class="redac" id="redac-est" readonly></textarea>
      <button class="btn-copy" id="cbtn-est" onclick="copiar('est')">Copiar — Plan Estándar</button>

      <hr class="divider">

      <!-- Plan Pro -->
      <div class="plan-label">
        📋 Plan Pro <span class="badge-win" id="badge-pro" style="display:none">Más conveniente</span>
      </div>
      <textarea class="redac" id="redac-pro" readonly></textarea>
      <button class="btn-copy" id="cbtn-pro" onclick="copiar('pro')">Copiar — Plan Pro</button>
    </div>
  </div>
</div>

<script>
var t='d';
var ED=[{m:2e6,r:.0219},{m:4e6,r:.0199},{m:8e6,r:.0179},{m:25e6,r:.0145},{m:1/0,r:.0119}];
var EC=[{m:2e6,r:.0269},{m:4e6,r:.0259},{m:8e6,r:.0249},{m:25e6,r:.0225},{m:1/0,r:.0199}];
var PD=[{m:5e6,f:89,r:.0074},{m:15e6,f:84,r:.0074},{m:30e6,f:79,r:.0069},{m:1/0,f:74,r:.0069}];
var PC=[{m:5e6,f:99,r:.0199},{m:15e6,f:99,r:.0189},{m:30e6,f:94,r:.0184},{m:1/0,f:89,r:.0179}];

var bEst="✅ Equipo Point Smart 2 de tu propiedad desde el primer día\n✅ Abono inmediato en cada venta\n✅ SIM 4G con internet gratis incluido en el equipo\n✅ Acepta débito, crédito y billeteras digitales\n✅ Cuotas sin interés para tus clientes · tú recibes el total al instante\n✅ Boletas electrónicas sin costo\n✅ Boletas en efectivo gratis los primeros 6 meses · desde el séptimo mes pagas $13.090/mes (servicio opcional)\n✅ Rollos de boletas gratis e ilimitados\n✅ Reportería en línea · visualiza tus ventas en tiempo real\n✅ Cuenta empresa Mercado Pago y tarjeta débito sin costo\n✅ Garantía 1 año\n✅ Acceso a crédito para capital de trabajo a partir del tercer mes\n💳 Pago contra entrega al momento de la instalación · $59.900 IVA incluido";
var bPro="✅ Equipo Point Smart 2 incluido en la suscripción y de tu propiedad\n✅ Abono inmediato en cada venta\n✅ SIM 4G con internet gratis incluido en el equipo\n✅ Acepta débito, crédito y billeteras digitales\n✅ Cuotas sin interés para tus clientes · tú recibes el total al instante\n✅ Boletas electrónicas y en efectivo sin costo · rollos de papel ilimitados\n✅ Reportería en línea · visualiza tus ventas en tiempo real\n✅ Cuenta empresa Mercado Pago y tarjeta débito sin costo\n✅ Garantía técnica extendida mientras mantengas la membresía activa\n✅ POS adicionales a $59.900 c/u · una sola membresía por RUT de negocio\n✅ Acceso a crédito para capital de trabajo a partir del tercer mes\n✅ Ecosistema Mercado Libre: precios exclusivos, entregas seguras y beneficios del marketplace\n💳 Pago contra entrega al momento de la instalación · membresía $18.445/mes (IVA incluido)";
var cierre="\n✨ ¡Cualquier consulta adicional, no dudes en preguntar con total confianza!\n\nSi deseas avanzar con la contratación, necesitaré los siguientes datos:\n👤 Nombre de contacto:\n📋 RUT de empresa:\n📍 Dirección de entrega:\n📅 Fecha y hora estimada de visita:\n📧 Correo electrónico:";

function fmt(n){return Math.round(n).toLocaleString('es-CL');}
function tr(arr,v){return arr.find(function(x){return v<=x.m;});}
function setT(v){
  t=v;
  document.getElementById('btn-d').className=v==='d'?'active':'';
  document.getElementById('btn-c').className=v==='c'?'active':'';
  calc();
}
function cE(r,v){var c=v*r,i=c*.19,d=c+i;return{c:c,i:i,d:d,r:v-d};}
function cP(f,r,v){var c=f+(v*r),i=c*.19,d=c+i;return{c:c,i:i,d:d,r:v-d};}
function mkCard(win,name,tasa,d){
  return '<div class="plan-card'+(win?' winner':'')+'">'+
    (win?'<div class="plan-badge">Más conveniente</div>':'<div class="plan-spacer"></div>')+
    '<div class="plan-name">'+name+'</div><div class="plan-tasa">'+tasa+'</div>'+
    '<div class="drow"><span class="lbl">Comisión</span><span class="val">$'+fmt(d.c)+'</span></div>'+
    '<div class="drow"><span class="lbl">+ IVA (19%)</span><span class="val">$'+fmt(d.i)+'</span></div>'+
    '<div class="drow"><span class="lbl">Descuento total</span><span class="val"><strong>$'+fmt(d.d)+'</strong></span></div>'+
    '<div class="recibe"><span class="lbl">Recibes por venta</span><span class="val">$'+fmt(d.r)+'</span></div></div>';
}
function autoHeight(el){
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
}
function calc(){
  var vol=parseFloat(document.getElementById('ventas').value)||0;
  var venta=parseFloat(document.getElementById('ticket').value)||0;
  if(!vol||!venta){
    document.getElementById('results').style.display='none';
    document.getElementById('empty').style.display='block';
    return;
  }
  document.getElementById('results').style.display='block';
  document.getElementById('empty').style.display='none';

  var tabE=t==='d'?ED:EC, tabP=t==='d'?PD:PC;
  var tE=tr(tabE,vol), tP=tr(tabP,vol);
  var dE=cE(tE.r,venta), dP=cP(tP.f,tP.r,venta);
  var win=dE.r>=dP.r?'e':'p';

  document.getElementById('cards').innerHTML=
    mkCard(win==='e','Plan Estándar','Tasa: '+(tE.r*100).toFixed(2)+'%',dE)+
    mkCard(win==='p','Plan Pro','$'+tP.f+' fijo + '+(tP.r*100).toFixed(2)+'%',dP);

  // Siempre calcular ambos con débito Y crédito
  var tED=tr(ED,vol),tEC=tr(EC,vol),tPD=tr(PD,vol),tPC=tr(PC,vol);
  var dED=cE(tED.r,venta),dEC=cE(tEC.r,venta);
  var dPD=cP(tPD.f,tPD.r,venta),dPC=cP(tPC.f,tPC.r,venta);

  // Badge ganador
  document.getElementById('badge-est').style.display=win==='e'?'inline-block':'none';
  document.getElementById('badge-pro').style.display=win==='p'?'inline-block':'none';

  // Texto Plan Estándar (siempre)
  var txtEst='Hola! 👋 Te comparto la simulación de acuerdo a tus ventas mensuales de $'+fmt(vol)+':\n\n'+
    '✅ *Plan Estándar* — sin mensualidad ni arriendo.\n\n'+
    '📊 Por cada venta de $'+fmt(venta)+' con tarjeta de débito/prepago:\n'+
    '• Tasa aplicada: '+(tED.r*100).toFixed(2)+'%\n• Comisión: $'+fmt(dED.c)+' + IVA ($'+fmt(dED.i)+')\n• Descuento total: $'+fmt(dED.d)+'\n• *Recibes: $'+fmt(dED.r)+'*\n\n'+
    '📊 Por cada venta de $'+fmt(venta)+' con tarjeta de crédito:\n'+
    '• Tasa aplicada: '+(tEC.r*100).toFixed(2)+'%\n• Comisión: $'+fmt(dEC.c)+' + IVA ($'+fmt(dEC.i)+')\n• Descuento total: $'+fmt(dEC.d)+'\n• *Recibes: $'+fmt(dEC.r)+'*\n\n'+
    '🎁 *Beneficios del Plan Estándar:*\n'+bEst+'\n'+cierre;

  // Texto Plan Pro (siempre)
  var txtPro='Hola! 👋 Te comparto la simulación de acuerdo a tus ventas mensuales de $'+fmt(vol)+':\n\n'+
    '✅ *Plan Mercado Pro* — membresía $18.445/mes (IVA incluido).\n\n'+
    '📊 Por cada venta de $'+fmt(venta)+' con tarjeta de débito/prepago:\n'+
    '• Tasa aplicada: $'+tPD.f+' fijo + '+(tPD.r*100).toFixed(2)+'%\n• Comisión: $'+fmt(dPD.c)+' + IVA ($'+fmt(dPD.i)+')\n• Descuento total: $'+fmt(dPD.d)+'\n• *Recibes: $'+fmt(dPD.r)+'*\n\n'+
    '📊 Por cada venta de $'+fmt(venta)+' con tarjeta de crédito:\n'+
    '• Tasa aplicada: $'+tPC.f+' fijo + '+(tPC.r*100).toFixed(2)+'%\n• Comisión: $'+fmt(dPC.c)+' + IVA ($'+fmt(dPC.i)+')\n• Descuento total: $'+fmt(dPC.d)+'\n• *Recibes: $'+fmt(dPC.r)+'*\n\n'+
    '🎁 *Beneficios del Plan Pro:*\n'+bPro+'\n'+cierre;

  var taEst=document.getElementById('redac-est');
  taEst.value=txtEst; autoHeight(taEst);
  var taPro=document.getElementById('redac-pro');
  taPro.value=txtPro; autoHeight(taPro);
}

function copiar(plan){
  var ta=document.getElementById('redac-'+plan);
  var btnId='cbtn-'+plan;
  if(!ta.value)return;
  ta.select();
  ta.setSelectionRange(0,99999);
  var exito=false;
  try{ exito=document.execCommand('copy'); }catch(e){}
  if(!exito && navigator.clipboard){
    navigator.clipboard.writeText(ta.value).then(function(){ok(btnId);}).catch(function(){
      alert('Mantén presionado el texto para copiarlo manualmente.');
    });
    return;
  }
  if(exito){ ok(btnId); }
  else{ alert('Mantén presionado el texto para copiarlo manualmente.'); }
}
function ok(btnId){
  var b=document.getElementById(btnId);
  var orig=b.textContent;
  b.textContent='✓ ¡Copiado!';
  b.classList.add('ok');
  setTimeout(function(){b.textContent=orig;b.classList.remove('ok');},2500);
}
</script>
</body>
</html>
