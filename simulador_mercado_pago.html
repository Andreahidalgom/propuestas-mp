<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Simulador de comisiones · Mercado Pago</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #111; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem; }
  .wrap { width: 100%; max-width: 560px; }
  .header { margin-bottom: 1.75rem; }
  .header h1 { font-size: 22px; font-weight: 600; color: #111; margin-bottom: 4px; }
  .header p { font-size: 14px; color: #666; }
  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 13px; color: #555; margin-bottom: 6px; }
  .field input { width: 100%; padding: 10px 14px; font-size: 15px; border: 1px solid #ddd; border-radius: 8px; background: #fff; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: #009ee3; }
  .toggle { display: flex; gap: 8px; margin-bottom: 1.5rem; }
  .toggle button { flex: 1; padding: 9px; border-radius: 8px; font-size: 14px; cursor: pointer; border: 1px solid #ddd; background: #fff; color: #555; transition: all 0.15s; }
  .toggle button.active { background: #009ee3; border-color: #009ee3; color: #fff; font-weight: 500; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 0.75rem; }
  .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 1rem 1.125rem; }
  .card.best { border: 2px solid #009ee3; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 6px; background: #e6f6fd; color: #007dbf; margin-bottom: 8px; }
  .card-name { font-size: 15px; font-weight: 600; color: #111; margin-bottom: 3px; }
  .card-tramo { font-size: 12px; color: #888; margin-bottom: 12px; }
  .row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-bottom: 1px solid #f0f0f0; }
  .row:last-child { border-bottom: none; }
  .row-label { font-size: 13px; color: #777; }
  .row-val { font-size: 14px; font-weight: 500; color: #111; }
  .row-total { font-size: 17px; font-weight: 600; color: #00a650; }
  .note { font-size: 11px; color: #aaa; margin-top: 0.5rem; }
  @media (max-width: 420px) { .cards { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>Simula tu comisión por venta</h1>
    <p>La tasa se determina según tu volumen mensual y se aplica al monto de cada venta</p>
  </div>

  <div class="field">
    <label for="vol">Ventas totales al mes ($)</label>
    <input type="text" id="vol" value="5.000.000" inputmode="numeric" autocomplete="off" />
  </div>

  <div class="field">
    <label for="ticket">Monto por venta ($)</label>
    <input type="text" id="ticket" value="50.000" inputmode="numeric" autocomplete="off" />
  </div>

  <div class="toggle">
    <button id="btn-debito" class="active" onclick="setTipo('debito')">Débito / Prepago</button>
    <button id="btn-credito" onclick="setTipo('credito')">Crédito</button>
  </div>

  <div class="cards" id="cards"></div>
  <p class="note" id="note"></p>
</div>

<script>
let tipo = 'debito';

const estandarTramos = {
  debito: [
    { max: 2000000,  tasa: 0.0219 },
    { max: 4000000,  tasa: 0.0199 },
    { max: 8000000,  tasa: 0.0179 },
    { max: 25000000, tasa: 0.0145 },
    { max: Infinity, tasa: 0.0119 },
  ],
  credito: [
    { max: 2000000,  tasa: 0.0269 },
    { max: 4000000,  tasa: 0.0259 },
    { max: 8000000,  tasa: 0.0249 },
    { max: 25000000, tasa: 0.0225 },
    { max: Infinity, tasa: 0.0199 },
  ]
};

const proTramos = {
  debito: [
    { max: 5000000,  fijo: 89, tasa: 0.0074 },
    { max: 15000000, fijo: 84, tasa: 0.0074 },
    { max: 30000000, fijo: 79, tasa: 0.0069 },
    { max: Infinity, fijo: 74, tasa: 0.0069 },
  ],
  credito: [
    { max: 5000000,  fijo: 99, tasa: 0.0199 },
    { max: 15000000, fijo: 99, tasa: 0.0189 },
    { max: 30000000, fijo: 94, tasa: 0.0184 },
    { max: Infinity, fijo: 89, tasa: 0.0179 },
  ]
};

function setTipo(t) {
  tipo = t;
  document.getElementById('btn-debito').classList.toggle('active', t === 'debito');
  document.getElementById('btn-credito').classList.toggle('active', t === 'credito');
  calcular();
}

function formatInput(el) {
  let pos = el.selectionStart;
  let prevLen = el.value.length;
  let raw = el.value.replace(/[^0-9]/g, '');
  if (raw === '') { el.value = ''; calcular(); return; }
  let formatted = Number(raw).toLocaleString('es-CL');
  el.value = formatted;
  let diff = formatted.length - prevLen;
  el.setSelectionRange(pos + diff, pos + diff);
}

function getRaw(id) {
  return parseFloat(document.getElementById(id).value.replace(/[^0-9]/g, '')) || 0;
}

function fmt(n) {
  return '$' + Math.round(n).toLocaleString('es-CL');
}

function pct(n) {
  return (n * 100).toFixed(2) + '%';
}

function calcular() {
  const vol    = getRaw('vol');
  const ticket = getRaw('ticket') || 1;

  // La tasa se determina por el volumen mensual, pero se aplica al monto de la venta
  const tramoE = estandarTramos[tipo].find(t => vol <= t.max);
  const comisionE     = ticket * tramoE.tasa;          // comisión sobre UNA venta
  const comisionEiva  = comisionE * 1.19;
  const neto_e        = ticket - comisionEiva;

  const tramoP = proTramos[tipo].find(t => vol <= t.max);
  const comisionP     = tramoP.fijo + ticket * tramoP.tasa; // fijo por transacción + % sobre venta
  const comisionPiva  = comisionP * 1.19;
  const neto_p        = ticket - comisionPiva;

  const mejor = comisionPiva < comisionEiva ? 'pro' : 'estandar';

  document.getElementById('cards').innerHTML = `
    <div class="card ${mejor === 'estandar' ? 'best' : ''}">
      ${mejor === 'estandar' ? '<span class="badge">Más conveniente</span>' : ''}
      <p class="card-name">Plan Estándar</p>
      <p class="card-tramo">Tasa del tramo: ${pct(tramoE.tasa)}</p>
      <div class="row"><span class="row-label">Comisión</span><span class="row-val">${fmt(comisionE)}</span></div>
      <div class="row"><span class="row-label">+ IVA (19%)</span><span class="row-val">${fmt(comisionE * 0.19)}</span></div>
      <div class="row"><span class="row-label">Descuento total</span><span class="row-val">${fmt(comisionEiva)}</span></div>
      <div class="row"><span class="row-label">Recibes por venta</span><span class="row-total">${fmt(neto_e)}</span></div>
    </div>
    <div class="card ${mejor === 'pro' ? 'best' : ''}">
      ${mejor === 'pro' ? '<span class="badge">Más conveniente</span>' : ''}
      <p class="card-name">Plan Pro</p>
      <p class="card-tramo">Tasa del tramo: ${fmt(tramoP.fijo)} fijo + ${pct(tramoP.tasa)}</p>
      <div class="row"><span class="row-label">Comisión</span><span class="row-val">${fmt(comisionP)}</span></div>
      <div class="row"><span class="row-label">+ IVA (19%)</span><span class="row-val">${fmt(comisionP * 0.19)}</span></div>
      <div class="row"><span class="row-label">Descuento total</span><span class="row-val">${fmt(comisionPiva)}</span></div>
      <div class="row"><span class="row-label">Recibes por venta</span><span class="row-total">${fmt(neto_p)}</span></div>
    </div>
  `;

  const tramoLabel = vol === 0 ? '—' : fmt(vol) + '/mes';
  document.getElementById('note').textContent =
    `Tramo calculado sobre ventas mensuales de ${tramoLabel}. El Plan Pro incluye suscripción mensual de $18.445 IVA incl.`;
}

document.getElementById('vol').addEventListener('input', function() { formatInput(this); calcular(); });
document.getElementById('ticket').addEventListener('input', function() { formatInput(this); calcular(); });
calcular();
</script>
</body>
</html>
