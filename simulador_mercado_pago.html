<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Mercado Pago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --mp-blue:#009EE3; --mp-blue-dark:#0077B6; --mp-blue-light:#E6F6FD;
  --green:#00A650; --green-light:#E6F7EE;
  --gray-50:#F8F9FA; --gray-100:#F1F3F4; --gray-200:#E8EAED;
  --gray-400:#9AA0A6; --text:#1A1A2E; --text-muted:#5F6368;
  --radius:14px; --radius-sm:8px;
}
body { font-family:'DM Sans',sans-serif; background:#F0F4F8; color:var(--text); min-height:100vh; padding:0 0 60px; }

.header { background:var(--mp-blue); padding:28px 24px 42px; position:relative; overflow:hidden; }
.header::after { content:''; position:absolute; bottom:-30px; left:0; right:0; height:60px; background:#F0F4F8; border-radius:50% 50% 0 0 / 60px; }
.header-badge { display:inline-flex; align-items:center; gap:6px; background:rgba(255,255,255,0.2); border-radius:20px; padding:4px 12px; font-size:12px; color:white; margin-bottom:12px; }
.mp-logo { width:28px; height:28px; background:white; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:var(--mp-blue); }
.header h1 { font-family:'DM Serif Display',serif; font-size:26px; color:white; line-height:1.2; font-weight:400; }
.header p { color:rgba(255,255,255,0.82); font-size:13px; margin-top:6px; }

.container { max-width:480px; margin:0 auto; padding:24px 16px 0; }
.section-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--gray-400); margin-bottom:12px; margin-top:28px; }

input[type=range] { width:100%; -webkit-appearance:none; height:4px; border-radius:4px; background:var(--gray-200); outline:none; cursor:pointer; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--mp-blue); cursor:pointer; border:3px solid white; box-shadow:0 0 0 1.5px var(--mp-blue); }

/* ── SIMULADOR ── */
#sim-root { margin-bottom:12px; }
.sc { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:22px 20px; }
.s-num { font-size:12px; color:var(--gray-400); margin-bottom:4px; }
.s-ttl { font-size:18px; font-weight:600; margin-bottom:5px; }
.s-sub { font-size:13.5px; color:var(--text-muted); line-height:1.55; margin-bottom:18px; }
.sprog { display:flex; gap:4px; margin-bottom:22px; }
.spb { flex:1; height:3px; border-radius:2px; background:var(--gray-200); transition:background .3s; }
.spb.on { background:var(--mp-blue); }
.s-inp { width:100%; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); font-family:'DM Sans',sans-serif; font-size:15px; color:var(--text); outline:none; padding:10px 13px; transition:border-color .15s; background:white; display:block; box-sizing:border-box; }
.s-inp:focus { border-color:var(--mp-blue); }
.s-big { font-size:26px; font-weight:700; text-align:center; padding:13px; }
input[type=range].s-range { -webkit-appearance:none; appearance:none; width:100%; height:4px; background:var(--gray-200); border-radius:2px; outline:none; cursor:pointer; }
input[type=range].s-range::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:var(--mp-blue); cursor:pointer; border:2px solid white; box-shadow:0 1px 4px rgba(0,0,100,.2); }
.s-cgrid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.s-cbtn { padding:11px 10px; background:white; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
.s-cbtn:hover { border-color:var(--mp-blue); }
.s-cbtn.sel { background:var(--mp-blue-light); border-color:var(--mp-blue); color:var(--mp-blue-dark); font-weight:600; }
.s-wbtn { width:100%; padding:12px 14px; background:white; border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); cursor:pointer; text-align:left; font-family:'DM Sans',sans-serif; margin-bottom:8px; display:flex; align-items:center; gap:10px; transition:all .15s; box-sizing:border-box; }
.s-wbtn:hover { border-color:var(--mp-blue); }
.s-wbtn.sel { background:var(--mp-blue-light); border-color:var(--mp-blue); }
.s-sbar { display:flex; border-radius:var(--radius-sm); overflow:hidden; height:50px; border:1.5px solid var(--gray-200); margin-bottom:11px; }
.s-sbar-d { background:var(--mp-blue-light); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:var(--mp-blue-dark); transition:width .15s; overflow:hidden; white-space:nowrap; }
.s-sbar-c { flex:1; background:#FEF3CD; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#856404; overflow:hidden; white-space:nowrap; }
.s-rlabels { display:flex; justify-content:space-between; font-size:12px; color:var(--gray-400); margin-top:4px; margin-bottom:16px; }
.s-nav { display:flex; gap:8px; margin-top:22px; }
.s-btnp { flex:1; padding:12px; font-size:14px; font-weight:600; background:var(--mp-blue); color:white; border:none; border-radius:var(--radius-sm); cursor:pointer; font-family:'DM Sans',sans-serif; transition:background .15s; }
.s-btnp:hover { background:var(--mp-blue-dark); }
.s-btnp:disabled { background:var(--gray-200); color:var(--gray-400); cursor:not-allowed; }
.s-btnback { padding:10px 15px; background:white; color:var(--text-muted); border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); cursor:pointer; font-family:'DM Sans',sans-serif; font-size:14px; }
.s-btnback:hover { background:var(--gray-50); }
.s-ibox { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:6px; padding:9px 12px; margin-top:10px; font-size:12.5px; color:var(--text-muted); line-height:1.6; }
/* result cards */
.s-pcard { background:white; border:1.5px solid var(--gray-200); border-radius:var(--radius); padding:16px 18px; margin-bottom:12px; position:relative; }
.s-pcard.rec { border:2px solid var(--mp-blue); }
.s-recbadge { position:absolute; top:-10px; left:14px; background:var(--mp-blue); color:white; font-size:11px; font-weight:700; padding:2px 10px; border-radius:20px; }
.s-ph { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.s-pname { font-size:15px; font-weight:700; }
.s-psub { font-size:11.5px; color:var(--text-muted); margin-top:2px; }
.s-pamount { font-size:20px; font-weight:700; color:var(--text); }
.s-pamount.hi { color:var(--mp-blue-dark); }
.s-pcostlbl { font-size:11px; color:var(--text-muted); margin-bottom:1px; text-align:right; }
.s-sbox { background:var(--gray-50); border-radius:6px; padding:9px 11px; margin-bottom:10px; font-size:12px; color:var(--text-muted); line-height:1.7; }
.s-sbox strong { font-weight:600; color:var(--text); }
.s-brow { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); padding:2px 0; }
.s-brow span:last-child { color:var(--text); font-weight:600; }
.s-bsep { border-top:1px dashed var(--gray-200); margin:5px 0; padding-top:6px; }
.s-biva { background:#FEF3CD; border-radius:4px; padding:3px 6px; margin-top:2px; display:flex; justify-content:space-between; font-size:12px; }
.s-biva span { color:#856404; font-weight:600; }
.s-btotal { display:flex; justify-content:space-between; font-size:13px; font-weight:700; color:var(--text); padding-top:8px; margin-top:6px; border-top:1.5px solid var(--gray-100); }
.s-concl { border-radius:var(--radius-sm); padding:11px 13px; margin-bottom:12px; font-size:13px; line-height:1.6; }
.s-concl.std { background:var(--gray-50); border:1px solid var(--gray-200); color:var(--text-muted); }
.s-concl.pro { background:var(--green-light); border:1px solid #8DD5B0; color:#1a4d30; }
.s-disc { font-size:11.5px; color:var(--gray-400); line-height:1.5; margin-bottom:12px; }
.s-reset { width:100%; padding:10px; font-size:13.5px; font-weight:500; background:white; color:var(--text-muted); border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); cursor:pointer; font-family:'DM Sans',sans-serif; }
.s-reset:hover { background:var(--gray-50); }
@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="header-badge">
    <span class="mp-logo">MP</span>
    Mercado Pago
  </div>
  <h1>Simulador de<br>costos mensuales</h1>
  <p>Compara Plan Estándar vs Plan Pro según tu negocio</p>
</div>

<div class="container">
  <p class="section-title">¿Cuál plan me conviene?</p>
  <div id="sim-root"></div>
</div>

<script>
// ── TRAMOS ───────────────────────────────────────────────────
const tramosStd = [
  [0,          2000001,  0.0219, 0.0269],
  [2000001,    4000001,  0.0199, 0.0259],
  [4000001,    8000001,  0.0179, 0.0249],
  [8000001,   25000001,  0.0145, 0.0225],
  [25000001,  999999999, 0.0119, 0.0199],
];
const tramosPro = [
  [0,          5000001,  89, 0.0074, 99, 0.0199],
  [5000001,   15000001,  84, 0.0074, 99, 0.0189],
  [15000001,  30000001,  79, 0.0069, 94, 0.0184],
  [30000001,  999999999, 74, 0.0069, 89, 0.0179],
];

// ── SIMULADOR PASO A PASO ─────────────────────────────────────
const TIPOS = [
  {id:"restaurante",label:"Restaurante / Café",   ticket:9000,  debito:65, ej:"ej: $8.000 por un almuerzo"},
  {id:"retail",     label:"Tienda / Ropa",         ticket:28000, debito:48, ej:"ej: $25.000 por una prenda"},
  {id:"servicios",  label:"Servicios",             ticket:50000, debito:38, ej:"ej: $45.000 por servicio"},
  {id:"salud",      label:"Salud / Belleza",       ticket:18000, debito:62, ej:"ej: $15.000 por un corte"},
  {id:"almacen",    label:"Almacén / Super",       ticket:7000,  debito:78, ej:"ej: $6.000 en compras del día"},
  {id:"otro",       label:"Otro negocio",          ticket:null,  debito:55, ej:null},
];
const SPRESETS = [
  {label:"Casi todo débito",value:85},
  {label:"Más débito",      value:65},
  {label:"Mitad y mitad",   value:50},
  {label:"Más crédito",     value:30},
];
const MENS_PRO = 18445;
const IVA = 0.19;

const ss = {negId:null, ventas:0, dPct:55, tkMode:"sug", ticket:0, txMode:"auto", txManual:0, boletas:null};

// ── Helpers ──────────────────────────────────────────────────
function sNeg(){ return TIPOS.find(n=>n.id===ss.negId)||null; }
function sTkEf(){ var n=sNeg(); return (ss.tkMode==="sug"&&n&&n.ticket)?n.ticket:ss.ticket; }
function sTxAuto(){ var t=sTkEf(); return t>0?Math.round(ss.ventas/t):0; }
function sTxFinal(){ return ss.txMode==="auto"?sTxAuto():(ss.txManual||0); }

function sFmt(n){ return "$"+Math.round(n).toLocaleString("es-CL"); }
function sPct(n){ return (n*100).toFixed(2)+"%"; }

function sgStd(v){ return tramosStd.find(function(t){return v>=t[0]&&v<t[1];})||tramosStd[tramosStd.length-1]; }
function sgPro(v){ return tramosPro.find(function(t){return v>=t[0]&&v<t[1];})||tramosPro[tramosPro.length-1]; }

function scalcular(v,dP,cant){
  var dF=dP/100, cF=1-dF, mD=v*dF, mC=v*cF;
  var txD=Math.round(cant*dF), txC=Math.round(cant*cF);
  var ts=sgStd(v), stdD=mD*ts[2], stdC=mC*ts[3];
  var stdNet=stdD+stdC, stdIva=stdNet*IVA;
  var tp=sgPro(v), proD=txD*tp[2]+mD*tp[3], proC=txC*tp[4]+mC*tp[5];
  var proNet=proD+proC, proIva=proNet*IVA;
  return {
    std:{d:stdD,c:stdC,net:stdNet,iva:stdIva,total:stdNet+stdIva,tdD:ts[2],tdC:ts[3]},
    pro:{d:proD,c:proC,net:proNet,iva:proIva,total:proNet+proIva+MENS_PRO,fD:tp[2],vD:tp[3],fC:tp[4],vC:tp[5]},
    mD:mD,mC:mC,txD:txD,txC:txC
  };
}

// ── Render ───────────────────────────────────────────────────
function sRender(html){
  var root=document.getElementById("sim-root");
  if(root){ root.innerHTML=html; sBind(); }
}

function sProg(n){
  var h='<div class="sprog">';
  for(var i=0;i<5;i++) h+='<div class="spb'+(i<n?' on':'')+'"></div>';
  return h+'</div>';
}

function sBind(){
  var vi=document.getElementById("sv-inp");
  if(vi){ vi.focus(); vi.addEventListener("input",function(e){
    var raw=e.target.value.replace(/[^0-9]/g,"");
    ss.ventas=raw?parseInt(raw,10):0;
    e.target.value=raw?"$"+ss.ventas.toLocaleString("es-CL"):"";
    var lbl=document.getElementById("sv-lbl");
    if(lbl) lbl.textContent=ss.ventas>0?sFmt(ss.ventas)+" al mes en ventas con tarjeta":"";
    var btn=document.getElementById("s-next-btn");
    if(btn) btn.disabled=ss.ventas<=0;
  });}
  var ti=document.getElementById("stk-inp");
  if(ti){ ti.focus(); ti.addEventListener("input",function(e){
    var raw=e.target.value.replace(/[^0-9]/g,"");
    ss.ticket=raw?parseInt(raw,10):0;
    e.target.value=raw?"$"+ss.ticket.toLocaleString("es-CL"):"";
    var btn=document.getElementById("s-next-btn");
    if(btn) btn.disabled=ss.ticket<=0;
  });}
  var txi=document.getElementById("stx-inp");
  if(txi){ txi.focus(); txi.addEventListener("input",function(e){
    ss.txManual=parseInt(e.target.value.replace(/[^0-9]/g,""),10)||0;
    e.target.value=e.target.value.replace(/[^0-9]/g,"");
    var btn=document.getElementById("s-next-btn");
    if(btn) btn.disabled=ss.txManual<=0;
  });}
  var ri=document.getElementById("srange-d");
  if(ri) ri.addEventListener("input",function(e){
    ss.dPct=parseInt(e.target.value,10);
    var cP=100-ss.dPct;
    var sd=document.getElementById("ssbar-d");
    var sc=document.getElementById("ssbar-c");
    if(sd){ sd.style.width=ss.dPct+"%"; sd.textContent=ss.dPct>=14?ss.dPct+"% débito":""; }
    if(sc) sc.textContent=cP>=14?cP+"% crédito":"";
  });
}

// ── Acciones onclick ─────────────────────────────────────────
function sSelNeg(id){ ss.negId=id; sStep1(); }
function sGoStep2(){ var n=sNeg(); if(!ss.negId||!n) return; ss.dPct=n.debito; ss.tkMode="sug"; sStep2(); }
function sGoStep3(){ if(ss.ventas>0) sStep3(); }
function sGoStep4(){ sStep4(); }
function sGoStep5(){ if(ss.tkMode==="sug"||ss.ticket>0) sStep5(); }
function sGoResult(){ if(sTxFinal()>0) sResult(); }
function sSetDpct(v){ ss.dPct=v; sStep3(); }
function sSetTkMode(m){ ss.tkMode=m; sStep4(); }
function sSetTxMode(m){ ss.txMode=m; sStep5(); }
function sReset(){ ss.negId=null; ss.ventas=0; ss.dPct=55; ss.tkMode="sug"; ss.ticket=0; ss.txMode="auto"; ss.txManual=0; ss.boletas=null; sStep1(); }

// ── Pasos ────────────────────────────────────────────────────
function sStep1(){
  var btns="";
  for(var i=0;i<TIPOS.length;i++){
    var t=TIPOS[i], sel=ss.negId===t.id;
    btns+='<button class="s-cbtn'+(sel?" sel":"")+'" onclick="sSelNeg(\''+t.id+'\')" style="text-align:left">'
         +'<div style="font-size:13px;font-weight:'+(sel?700:400)+'">'+t.label+'</div>'
         +'</button>';
  }
  sRender('<div class="sc">'
    +sProg(1)
    +'<p class="s-num">Paso 1 de 5</p>'
    +'<h3 class="s-ttl">¿A qué se dedica tu negocio?</h3>'
    +'<p class="s-sub">Te daremos valores de referencia más precisos según tu rubro.</p>'
    +'<div class="s-cgrid">'+btns+'</div>'
    +'<div class="s-nav">'
    +'<button class="s-btnp" '+(ss.negId?"":"disabled")+' onclick="sGoStep2()">Siguiente</button>'
    +'</div>'
    +'</div>');
}

function sStep2(){
  var v=ss.ventas>0?"$"+ss.ventas.toLocaleString("es-CL"):"";
  sRender('<div class="sc">'
    +sProg(2)
    +'<p class="s-num">Paso 2 de 5</p>'
    +'<h3 class="s-ttl">¿Cuánto vendes con tarjeta al mes?</h3>'
    +'<p class="s-sub">Ingresa el total en pesos de tus ventas con tarjeta (débito + crédito) en un mes normal.</p>'
    +'<input id="sv-inp" class="s-inp s-big" type="text" inputmode="numeric" value="'+v+'" placeholder="$0">'
    +'<p id="sv-lbl" style="text-align:center;font-size:12.5px;color:var(--text-muted);margin-top:7px">'+(ss.ventas>0?sFmt(ss.ventas)+" al mes en ventas con tarjeta":"")+'</p>'
    +'<div class="s-ibox">💡 Si no tienes el número exacto, puedes estimar. Ej: si vendes $200.000 con tarjeta por semana, escribe $800.000.</div>'
    +'<div class="s-nav">'
    +'<button class="s-btnback" onclick="sStep1()">←</button>'
    +'<button id="s-next-btn" class="s-btnp" '+(ss.ventas<=0?"disabled":"")+' onclick="sGoStep3()">Siguiente</button>'
    +'</div>'
    +'</div>');
}

function sStep3(){
  var cP=100-ss.dPct;
  var presets="";
  for(var i=0;i<SPRESETS.length;i++){
    var p=SPRESETS[i], sel=ss.dPct===p.value;
    presets+='<button class="s-cbtn'+(sel?" sel":"")+'" style="text-align:center;font-size:13px" onclick="sSetDpct('+p.value+')">'+p.label+'</button>';
  }
  sRender('<div class="sc">'
    +sProg(3)
    +'<p class="s-num">Paso 3 de 5</p>'
    +'<h3 class="s-ttl">¿Cómo pagan tus clientes con tarjeta?</h3>'
    +'<p class="s-sub">Indica cuántos pagos recibes con <strong>tarjeta débito</strong> versus pagos con <strong>tarjeta de crédito</strong> (estimativo).</p>'
    +'<div class="s-sbar">'
    +'<div id="ssbar-d" class="s-sbar-d" style="width:'+ss.dPct+'%;min-width:'+(ss.dPct>8?54:0)+'px">'+(ss.dPct>=14?ss.dPct+"% débito":"")+'</div>'
    +'<div id="ssbar-c" class="s-sbar-c">'+(cP>=14?cP+"% crédito":"")+'</div>'
    +'</div>'
    +'<input id="srange-d" class="s-range" type="range" min="0" max="100" step="5" value="'+ss.dPct+'">'
    +'<div class="s-rlabels"><span>← Todo crédito</span><span>Todo débito →</span></div>'
    +'<p style="font-size:12.5px;color:var(--text-muted);margin-bottom:8px">O elige una opción rápida:</p>'
    +'<div class="s-cgrid">'+presets+'</div>'
    +'<div class="s-nav">'
    +'<button class="s-btnback" onclick="sStep2()">←</button>'
    +'<button class="s-btnp" onclick="sGoStep4()">Siguiente</button>'
    +'</div>'
    +'</div>');
}

function sStep4(){
  var n=sNeg(), tkS=n&&n.ticket, msel=ss.tkMode==="manual";
  var sug="";
  if(tkS){
    var sel=ss.tkMode==="sug";
    sug='<button class="s-wbtn'+(sel?" sel":"")+'" onclick="sSetTkMode(\'sug\')">'
       +'<div style="flex:1">'
       +'<div style="font-size:11.5px;margin-bottom:2px;color:'+(sel?"var(--mp-blue-dark)":"var(--text-muted)")+'">Valor sugerido para '+n.label+'</div>'
       +'<div style="font-size:20px;font-weight:700">'+sFmt(tkS)+'</div>'
       +'</div>'
       +(sel?'<span style="color:var(--mp-blue);font-size:18px">✓</span>':"")
       +'</button>';
  }
  var tkVal=ss.ticket>0?"$"+ss.ticket.toLocaleString("es-CL"):"";
  sRender('<div class="sc">'
    +sProg(4)
    +'<p class="s-num">Paso 4 de 5</p>'
    +'<h3 class="s-ttl">¿Cuánto cobras por cada venta?</h3>'
    +'<p class="s-sub">Piensa en el valor más frecuente de tus ventas.'+(n&&n.ej?' Por ejemplo en tu rubro: <em>'+n.ej+'</em>.':'')+'</p>'
    +sug
    +'<button class="s-wbtn'+(msel?" sel":"")+'" onclick="sSetTkMode(\'manual\')">✏️ Ingresar mi propio valor aquí</button>'
    +(msel?'<input id="stk-inp" class="s-inp s-big" type="text" inputmode="numeric" value="'+tkVal+'" placeholder="$0">':'')
    +'<div class="s-nav">'
    +'<button class="s-btnback" onclick="sStep3()">←</button>'
    +'<button id="s-next-btn" class="s-btnp" '+(msel&&ss.ticket<=0?"disabled":"")+' onclick="sGoStep5()">Siguiente</button>'
    +'</div>'
    +'</div>');
}

function sStep5(){
  var ta=sTxAuto(), tkE=sTkEf(), msel=ss.txMode==="manual";
  var auto="";
  if(ta>0){
    var sel=ss.txMode==="auto";
    auto='<button class="s-wbtn'+(sel?" sel":"")+'" onclick="sSetTxMode(\'auto\')">'
        +'<div style="flex:1">'
        +'<div style="font-size:11.5px;margin-bottom:2px;color:'+(sel?"var(--mp-blue-dark)":"var(--text-muted)")+'">Calculado automáticamente</div>'
        +'<div style="font-size:20px;font-weight:700">~'+ta.toLocaleString("es-CL")+" ventas al mes</div>"
        +'<div style="font-size:11.5px;color:var(--text-muted);margin-top:2px">'+sFmt(ss.ventas)+' ÷ '+sFmt(tkE)+' por venta</div>'
        +'</div>'
        +(sel?'<span style="color:var(--mp-blue);font-size:18px">✓</span>':"")
        +'</button>';
  }
  sRender('<div class="sc">'
    +sProg(5)
    +'<p class="s-num">Paso 5 de 5</p>'
    +'<h3 class="s-ttl">¿Cuántas ventas con tarjeta haces al mes?</h3>'
    +'<p class="s-sub">Puedes usar el número calculado automáticamente o ingresar el tuyo si lo sabes con exactitud.</p>'
    +auto
    +'<button class="s-wbtn'+(msel?" sel":"")+'" onclick="sSetTxMode(\'manual\')">✏️ Ingresar mi propio valor en cantidad de transacciones con tarjeta al mes (estimativo)</button>'
    +(msel?'<input id="stx-inp" class="s-inp s-big" type="text" inputmode="numeric" value="'+(ss.txManual>0?ss.txManual:"")+'" placeholder="Ej: 200">':'')
    +'<div class="s-nav">'
    +'<button class="s-btnback" onclick="sStep4()">←</button>'
    +'<button id="s-next-btn" class="s-btnp" '+(sTxFinal()<=0?"disabled":"")+' onclick="sGoResult()">Ver mi simulación →</button>'
    +'</div>'
    +'</div>');
}

const BOLETAS_STD = 13070;

function sBolBtnStyle(val){
  var active = ss.boletas === val;
  return 'style="flex:1;padding:10px;font-size:13px;font-weight:'+(active?700:500)+';'
    +'background:'+(active?(val?'var(--green-light)':'var(--gray-100)'):'white')+';'
    +'border:1.5px solid '+(active?(val?'#8DD5B0':'var(--gray-400)'):'var(--gray-200)')+';'
    +'border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;'
    +'color:'+(active?(val?'#1a4d30':'var(--text)'):'var(--text-muted)')+';"';
}
function sSetBoletas(v){ ss.boletas=v; sResult(); }

function sPlanCard(r, isPro, isRec){
  var comNet = isPro ? r.pro.net : r.std.net;
  var iva    = isPro ? r.pro.iva : r.std.iva;
  var comTotal = comNet + iva;
  var extra = 0, extraLabel = "";
  if(isPro){ extra = MENS_PRO; extraLabel = "Suscripción mensual Plan Pro"; }
  else if(ss.boletas === true){ extra = BOLETAS_STD; extraLabel = "Servicio boletas en efectivo"; }
  var grandTotal = comTotal + extra;
  var neto = ss.ventas - grandTotal;
  var cP = 100 - ss.dPct, tf = sTxFinal(), tkE = sTkEf();
  var rows = "";
  if(isPro){
    rows += '<div class="s-brow"><span>Comisión débito ('+sFmt(r.pro.fD)+' × '+r.txD+' tx + '+sPct(r.pro.vD)+')</span><span>'+sFmt(r.pro.d)+'</span></div>';
    rows += '<div class="s-brow"><span>Comisión crédito ('+sFmt(r.pro.fC)+' × '+r.txC+' tx + '+sPct(r.pro.vC)+')</span><span>'+sFmt(r.pro.c)+'</span></div>';
  } else {
    rows += '<div class="s-brow"><span>Comisión débito ('+sPct(r.std.tdD)+' sobre '+sFmt(r.mD)+')</span><span>'+sFmt(r.std.d)+'</span></div>';
    rows += '<div class="s-brow"><span>Comisión crédito ('+sPct(r.std.tdC)+' sobre '+sFmt(r.mC)+')</span><span>'+sFmt(r.std.c)+'</span></div>';
  }
  rows += '<div class="s-brow s-bsep"><span>Subtotal comisiones (sin IVA)</span><span>'+sFmt(comNet)+'</span></div>';
  rows += '<div class="s-biva"><span>IVA 19% sobre comisiones</span><span>'+sFmt(iva)+'</span></div>';
  if(extra > 0){
    rows += '<div class="s-brow" style="margin-top:6px;padding-top:6px;border-top:1px solid var(--gray-200)"><span>'+extraLabel+'</span><span>'+sFmt(extra)+'</span></div>';
  }
  var costLabel = extra > 0 ? "Costo total mensual (IVA incl.)" : "Comisiones totales (IVA incl.)";
  var psub = isPro
    ? "Mensualidad "+sFmt(MENS_PRO)+"/mes · incluye servicio de boletas en efectivo"
    : "Sin mensualidad · solo comisiones · puedes agregar boletas en efectivo por $13.070/mes (primeros 6 meses gratis)";
  return '<div class="s-pcard'+(isRec?" rec":"")+'"">'
    +(isRec?'<div class="s-recbadge">★ Recomendado para ti</div>':"")
    +'<div class="s-ph" style="padding-top:'+(isRec?6:0)+'px">'
    +'<div><div class="s-pname">'+( isPro?"Plan Pro":"Plan Estándar")+'</div>'
    +'<div class="s-psub">'+psub+'</div></div>'
    +'<div><div class="s-pcostlbl">'+costLabel+'</div>'
    +'<div class="s-pamount'+(isRec?" hi":"")+'">'+sFmt(grandTotal)+'</div></div>'
    +'</div>'
    +'<div class="s-sbox">Con ventas de <strong>'+sFmt(ss.ventas)+'</strong>, '+ss.dPct+'% débito y '+cP+'% crédito, ticket promedio de <strong>'+sFmt(tkE)+'</strong> y <strong>'+tf.toLocaleString("es-CL")+' transacciones</strong> al mes'
    +(extra>0?', incluyendo '+extraLabel.toLowerCase():"")
    +', el costo mensual estimado del '+(isPro?"Plan Pro":"Plan Estándar")+' es de <strong>'+sFmt(grandTotal)+'</strong>.</div>'
    +rows
    +'<div class="s-btotal"><span>Lo que recibirías al mes</span><span>'+sFmt(neto)+'</span></div>'
    +'</div>';
}

function sResult(){
  var r = scalcular(ss.ventas, ss.dPct, sTxFinal());
  var stdCom = r.std.net + r.std.iva + (ss.boletas === true ? BOLETAS_STD : 0);
  var proCom = r.pro.net + r.pro.iva + MENS_PRO;
  var proMejor = proCom < stdCom;
  var ahorro = Math.abs(stdCom - proCom);
  var n = sNeg(), label = n ? n.label : "tu negocio";
  var boletasBlock = '<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:16px;">'
    +'<p style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">📄 ¿Necesitas emitir boletas en efectivo?</p>'
    +'<p style="font-size:12px;color:var(--text-muted);margin-bottom:10px;line-height:1.5;">Plan Estándar: servicio opcional por <strong>$13.070/mes</strong> (primeros 6 meses gratis) · Plan Pro: <strong>incluido sin costo adicional</strong>.</p>'
    +'<div style="display:flex;gap:8px;">'
    +'<button '+sBolBtnStyle(true)+' onclick="sSetBoletas(true)">✅ Marca aquí para suscribir plan de boletas para el efectivo</button>'
    +'<button '+sBolBtnStyle(false)+' onclick="sSetBoletas(false)">No por ahora</button>'
    +'</div>'
    +'</div>';
  var conclText = "";
  if(ss.boletas !== null){
    conclText = proMejor
      ? '📈 Con tu volumen de ventas, el <strong>Plan Pro</strong> te conviene más: pagarías aproximadamente <strong>'+sFmt(ahorro)+'</strong> menos al mes frente al Plan Estándar'+(ss.boletas?' (incluyendo boletas en efectivo en ambos planes).':".")
      : '💡 Con tu volumen actual, el <strong>Plan Estándar</strong> es la mejor opción: pagarías aproximadamente <strong>'+sFmt(ahorro)+'</strong> menos al mes frente al Plan Pro'+(ss.boletas?' (incluyendo boletas en efectivo en ambos planes).':'.');
  }
  sRender('<div class="sc">'
    +'<p class="s-num">Resultado</p>'
    +'<h3 class="s-ttl">Simulación de '+label+'</h3>'
    +'<p class="s-sub" style="margin-bottom:16px">Comparativa de costos mensuales · IVA incluido en comisiones</p>'
    +boletasBlock
    +sPlanCard(r, false, !proMejor)
    +sPlanCard(r, true, proMejor)
    +(conclText ? '<div class="s-concl '+(proMejor?"pro":"std")+'">'+conclText+'</div>' : "")
    +'<p class="s-disc">* Simulación referencial. Las comisiones incluyen IVA 19%. Los valores pueden variar según la estructura real de tus transacciones.</p>'
    +'<button class="s-reset" onclick="sReset()">↺ Simular de nuevo</button>'
    +'</div>');
}

// Iniciar simulador
sStep1();
</script>
</body>
</html>
